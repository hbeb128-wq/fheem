<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تفاصيل اللعبة - منصة فهيم</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: #f4f7f6; margin: 0; padding: 0; text-align: center; }
        .container { max-width: 800px; margin: 50px auto; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .back-btn { display: inline-block; margin-bottom: 20px; text-decoration: none; color: #3498db; font-weight: bold; }
        .main-img { width: 100%; max-height: 400px; object-fit: contain; border-radius: 15px; margin-bottom: 20px; background: #fafafa; }
        h1 { color: #2c3e50; margin-bottom: 15px; }
        .description { font-size: 1.2em; color: #7f8c8d; line-height: 1.6; margin-bottom: 30px; text-align: justify; padding: 0 20px; }
        
        /* تنسيق السعر */
        .price-box { font-size: 1.5em; color: #e74c3c; font-weight: bold; margin-bottom: 20px; }
        
        /* تنسيق زر الواتساب الجديد */
        .whatsapp-btn { 
            display: inline-block; 
            background-color: #25d366; 
            color: white; 
            padding: 15px 40px; 
            text-decoration: none; 
            border-radius: 50px; 
            font-size: 1.3em; 
            font-weight: bold; 
            transition: all 0.3s ease;
            box-shadow: 0 4px 10px rgba(37, 211, 102, 0.3);
        }
        .whatsapp-btn:hover { 
            background-color: #128c7e; 
            transform: scale(1.05);
            box-shadow: 0 6px 15px rgba(37, 211, 102, 0.4);
        }
    </style>
</head>
<body>

    <div class="container">
        <a href="index.html" class="back-btn">⬅ العودة للرئيسية</a>
        
        <img src="1.png" alt="صورة اللعبة" class="main-img">

        <h1>سبع تقنيات لضبط الصف</h1>
        
        <div class="description">
            المتسلقون - الرادار - المؤقت - السباق - عجلة الحظ - كأس التحدي - الصندوق.
        </div>

        <div class="price-box">السعر: 40 ريال</div>

        <a href="https://wa.me/9665XXXXXXXX?text=السلام%20عليكم%20أستاذ%20حبيب،%20أريد%20شراء%20لعبة%20(سبع%20تقنيات%20لضبط%20الصف)" class="whatsapp-btn">
            💬 اطلب اللعبة الآن عبر واتساب
        </a>
    </div>

    <footer style="margin-top: 30px; color: #bdc3c7; padding-bottom: 30px;">
        إشراف الأستاذ: حبيب عبد الله الخالدي
    </footer>

</body>
</html>
